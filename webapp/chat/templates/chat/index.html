{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ACU AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'chat/app.css' %}?v=20260330-8" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand__mark">ACU</div>
          <div class="brand__text">
            <div class="brand__title">ACU AI Chatbot</div>
          </div>
        </div>

        <div class="panel">
          <button class="sidebar__new" type="button" id="newChatBtn">
            New chat
          </button>
          <div class="panel__title">Chat history</div>
          <div class="history" id="sessionList">
            {% if sessions %}
              {% for s in sessions %}
                <div class="history__item" data-session-id="{{ s.id }}">
                  <button class="history__open" type="button" data-session-id="{{ s.id }}">
                    <div class="history__q">
                      {{ s.title|default:"Untitled chat"|truncatechars:80 }}
                    </div>
                    <div class="history__meta">
                      {{ s.updated_at|date:"Y-m-d H:i" }}
                    </div>
                  </button>
                  <button class="history__delete" type="button" data-session-id="{{ s.id }}" aria-label="Delete chat" title="Delete chat">🗑</button>
                </div>
              {% endfor %}
            {% else %}
              <div class="history__empty">No messages yet.</div>
            {% endif %}
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar__title">Chat</div>
        </header>

        <section class="chat" id="chat">
          <div class="chat__inner" id="chatMessages"></div>
        </section>

        <footer class="composer">
          <form class="composer__form" id="chatForm">
            <div class="composer__field">
              <textarea
                id="question"
                name="question"
                class="composer__input"
                rows="1"
                autocomplete="off"
                required
              ></textarea>
              <button class="composer__send" type="submit" id="sendBtn">
                Send
              </button>
            </div>
          </form>
        </footer>
      </main>
    </div>

    <script>
      window.ACU_CHAT = {
        apiUrl: "{% url 'chat-api' %}",
        sessionsUrl: "{% url 'chat-sessions' %}",
        // Route is "/api/sessions/<id>/". We replace the placeholder `0` with `{id}`.
        sessionUrlTemplate: "{% url 'chat-session-messages' 0 %}".replace(/\/0\/$/, "/{id}/")
      };
    </script>
    <script defer src="{% static 'chat/app.js' %}?v=20260330-8"></script>
  </body>
</html>
