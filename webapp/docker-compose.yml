services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acubot_db
      POSTGRES_USER: acu_user
      POSTGRES_PASSWORD: acu_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acu_user -d acubot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8001:8000"
    environment:
      POSTGRES_DB: acubot_db
      POSTGRES_USER: acu_user
      POSTGRES_PASSWORD: acu_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OLLAMA_URL: "http://ollama:11434"
      LLM_URL: "http://ollama:11434"
      LLM_MODEL: "llama3.2:3b"
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
  ollama_data:
